<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BoltX — Template Artifacts</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy:   #1E3A5F; --blue:  #2E75B6; --teal: #1A7B8A;
  --green:  #1F7A4D; --orange:#C55A11; --red:  #B22222;
  --purple: #5B2D8E; --gray:  #6B7280;
  --bg: #F0F4F8; --card: #F8FAFC; --border: #E2E8F0;
  --text: #1E293B; --sub: #64748B;
}
body { font-family:'Be Vietnam Pro',sans-serif; background:var(--bg); color:var(--text); font-size:13px; }

/* HEADER */
.header { background:linear-gradient(120deg,#1E3A5F,#2a5298); padding:22px 32px 18px; color:#fff; }
.header-title { font-size:22px; font-weight:900; letter-spacing:-.5px; }
.header-sub   { font-size:13px; opacity:.75; margin-top:4px; }
.tabs { margin-top:14px; display:flex; gap:8px; flex-wrap:wrap; }
.tab-btn { background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.2); color:#fff; border-radius:6px; padding:5px 14px; font-size:12px; font-weight:600; cursor:pointer; font-family:inherit; transition:all .15s; }
.tab-btn:hover  { background:rgba(255,255,255,.15); }
.tab-btn.active { background:rgba(255,255,255,.22); border-color:rgba(255,255,255,.6); font-weight:800; }

.body { padding:24px 28px; }
.tab-panel { display:none; }
.tab-panel.active { display:block; }

/* GRID */
.tmpl-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:16px; }

/* TEMPLATE CARD */
.tmpl-card {
  background:#fff; border-radius:12px; border:1.5px solid var(--border);
  overflow:hidden; cursor:pointer;
  transition:box-shadow .15s, transform .15s;
}
.tmpl-card:hover { box-shadow:0 6px 24px rgba(0,0,0,.1); transform:translateY(-2px); }
.tc-header { padding:14px 16px 10px; border-bottom:1px solid var(--border); }
.tc-badge { display:inline-flex; align-items:center; gap:5px; border-radius:20px; padding:3px 10px; font-size:10px; font-weight:800; color:#fff; margin-bottom:8px; }
.tc-title { font-size:14px; font-weight:800; color:var(--navy); margin-bottom:3px; }
.tc-meta  { display:flex; gap:6px; flex-wrap:wrap; margin-top:4px; }
.tc-chip  { border-radius:4px; padding:2px 7px; font-size:10px; font-weight:700; }
.tc-body  { padding:12px 16px 14px; }
.tc-desc  { font-size:11.5px; color:var(--sub); line-height:1.5; margin-bottom:8px; }
.tc-fields { display:flex; flex-direction:column; gap:4px; }
.tc-field { display:flex; gap:6px; font-size:11px; color:var(--text); align-items:flex-start; }
.tc-dot   { width:5px; height:5px; border-radius:50%; flex-shrink:0; margin-top:4px; }
.tc-footer { padding:8px 16px 12px; display:flex; align-items:center; justify-content:space-between; }
.tc-owner { font-size:10.5px; font-weight:700; }
.tc-when  { font-size:10px; color:var(--sub); }

/* MODAL */
.overlay { display:none; position:fixed; inset:0; background:rgba(15,23,42,.5); z-index:100; align-items:flex-start; justify-content:center; padding:32px 16px; overflow-y:auto; }
.overlay.active { display:flex; }
.modal {
  background:#fff; border-radius:16px; width:100%; max-width:720px;
  box-shadow:0 24px 64px rgba(0,0,0,.25); animation:su .18s ease;
  margin:auto;
}
@keyframes su { from { transform:translateY(16px); opacity:0; } }
.modal-header { padding:22px 24px 14px; border-bottom:1px solid var(--border); position:sticky; top:0; background:#fff; border-radius:16px 16px 0 0; z-index:1; }
.modal-close  { position:absolute; top:14px; right:14px; background:var(--bg); border:none; border-radius:6px; width:30px; height:30px; cursor:pointer; font-size:18px; color:var(--gray); font-family:inherit; display:flex; align-items:center; justify-content:center; }
.modal-tag    { font-size:10px; font-weight:800; letter-spacing:.5px; text-transform:uppercase; margin-bottom:5px; }
.modal-title  { font-size:20px; font-weight:900; margin-bottom:6px; }
.modal-meta   { display:flex; gap:6px; flex-wrap:wrap; }
.modal-body   { padding:20px 24px 28px; }

/* template content */
.tmpl-section { margin-bottom:22px; }
.ts-title { font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.5px; color:var(--gray); margin-bottom:10px; display:flex; align-items:center; gap:6px; }
.ts-title::after { content:''; flex:1; height:1px; background:var(--border); }

/* form-like fields */
.field-group { display:flex; flex-direction:column; gap:8px; }
.field-row { display:grid; grid-template-columns:160px 1fr; gap:8px; align-items:start; }
.field-row.full { grid-template-columns:1fr; }
.field-label { font-size:11px; font-weight:800; color:var(--navy); padding-top:8px; }
.field-label .req { color:var(--red); margin-left:2px; }
.field-input {
  background:var(--card); border:1.5px solid var(--border); border-radius:7px;
  padding:7px 10px; font-size:12px; color:var(--sub);
  font-style:italic; line-height:1.5; min-height:34px;
}
.field-input.tall { min-height:64px; }
.field-input.code { font-family:monospace; font-size:11px; background:#F8F9FA; }
.field-input.req-field { border-color:#fca5a5; background:#FFF5F5; }

/* radio/checkbox group */
.opt-group { display:flex; flex-wrap:wrap; gap:5px; }
.opt { border-radius:5px; padding:3px 9px; font-size:11px; font-weight:700; border:1.5px solid; cursor:default; }
.opt.selected { color:#fff; }

/* checklist */
.checklist { display:flex; flex-direction:column; gap:5px; }
.cl-item { display:flex; gap:8px; align-items:flex-start; }
.cl-box { width:16px; height:16px; border:1.5px solid var(--border); border-radius:3px; flex-shrink:0; margin-top:2px; background:#fff; }
.cl-text { font-size:12px; color:var(--text); line-height:1.5; }
.cl-text .req-mark { font-size:10px; font-weight:800; color:var(--red); }

/* note box */
.note-box { border-radius:8px; padding:10px 14px; font-size:12px; line-height:1.5; border-left:3px solid; margin-top:8px; }

/* copy button */
.copy-btn { background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:4px 12px; font-size:11px; font-weight:700; cursor:pointer; font-family:inherit; color:var(--gray); transition:all .15s; }
.copy-btn:hover { background:var(--border); }

/* table */
.tmpl-table { width:100%; border-collapse:collapse; font-size:12px; }
.tmpl-table th { background:var(--navy); color:#fff; padding:7px 10px; text-align:left; font-size:11px; }
.tmpl-table td { padding:7px 10px; border-bottom:1px solid var(--border); vertical-align:top; }
.tmpl-table tr:nth-child(even) td { background:var(--card); }
.tmpl-table .placeholder { color:var(--sub); font-style:italic; }
</style>
</head>

// ─── RENDER ──────────────────────────────────────
function renderCards(tab) {
  const filtered = tab === 'all' ? TEMPLATES : TEMPLATES.filter(t => t.tab === tab);
  return filtered.map(t => `
    <div class="tmpl-card" onclick="openTemplate('${t.id}')">
      <div class="tc-header">
        <div class="tc-badge" style="background:${t.badgeColor};">${t.badge}</div>
        <div class="tc-title">${t.title}</div>
        <div class="tc-meta">
          ${t.chips.map(c => `<span class="tc-chip" style="background:${c.c}22;color:${c.c};border:1px solid ${c.c}44;">${c.l}</span>`).join('')}
        </div>
      </div>
      <div class="tc-body">
        <div class="tc-desc">${t.desc}</div>
      </div>
      <div class="tc-footer">
        <span class="tc-owner" style="color:${t.badgeColor};">👤 ${t.owner}</span>
        <span class="tc-when">⏰ ${t.when}</span>
      </div>
    </div>
  `).join('');
}

function buildModalContent(t) {
  let html = '';
  for (const sec of t.sections) {
    html += `<div class="tmpl-section">`;
    html += `<div class="ts-title">${sec.title}</div>`;

    if (sec.type === 'table') {
      html += `<div style="overflow-x:auto;"><table class="tmpl-table"><tr>${sec.headers.map(h=>`<th>${h}</th>`).join('')}</tr>`;
      html += sec.rows.map(r => `<tr>${r.map(c=>`<td class="placeholder">${c||'&nbsp;'}</td>`).join('')}</tr>`).join('');
      html += `</table></div>`;
    } else if (sec.type === 'checklist') {
      html += `<div class="checklist">`;
      html += sec.items.map(item => `
        <div class="cl-item">
          <div class="cl-box"></div>
          <div class="cl-text">
            ${item.text}
            ${item.req ? '<span class="req-mark"> *</span>' : ''}
            <span style="font-size:10px;color:var(--sub);margin-left:6px;">[${item.owner}]</span>
          </div>
        </div>`).join('');
      html += `</div>`;
    } else if (sec.fields) {
      html += `<div class="field-group">`;
      for (const f of sec.fields) {
        if (f.type === 'options') {
          html += `<div class="field-row"><div class="field-label">${f.label}${f.req?'<span class="req">*</span>':''}</div><div class="opt-group">${f.opts.map(o=>`<span class="opt" style="background:${o.c}18;color:${o.c};border-color:${o.c}44;">${o.l}</span>`).join('')}</div></div>`;
        } else if (f.type === 'textarea') {
          html += `<div class="field-row full"><div class="field-label">${f.label}${f.req?'<span class="req">*</span>':''}</div><div class="field-input tall${f.req?' req-field':''}" style="white-space:pre-line;">${f.placeholder||''}</div></div>`;
        } else {
          html += `<div class="field-row"><div class="field-label">${f.label}${f.req?'<span class="req">*</span>':''}</div><div class="field-input${f.req?' req-field':''}">${f.placeholder||''}</div></div>`;
        }
      }
      html += `</div>`;
    }
    html += `</div>`;
  }
  if (t.note) {
    html += `<div class="note-box" style="background:${t.note.bg};border-color:${t.note.color};color:${t.note.color};">💡 ${t.note.text}</div>`;
  }
  return html;
}

function openTemplate(id) {
  const t = TEMPLATES.find(x => x.id === id);
  if (!t) return;
  document.getElementById('mTag').textContent = t.badge;
  document.getElementById('mTag').style.color = t.badgeColor;
  document.getElementById('mTitle').textContent = t.title;
  document.getElementById('mTitle').style.color = t.badgeColor;
  document.getElementById('mMeta').innerHTML =
    `<span style="font-size:11px;background:${t.badgeColor}18;color:${t.badgeColor};border:1px solid ${t.badgeColor}44;border-radius:4px;padding:2px 8px;font-weight:700;">👤 ${t.owner}</span>` +
    `<span style="font-size:11px;background:#F1F5F9;color:var(--gray);border-radius:4px;padding:2px 8px;">⏰ ${t.when}</span>`;
  document.getElementById('mBody').innerHTML = buildModalContent(t);
  document.getElementById('overlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('overlay').classList.remove('active');
  document.body.style.overflow = '';
}
function closeBg(e) { if (e.target === document.getElementById('overlay')) closeModal(); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// Tabs
function renderTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  document.getElementById('grid-' + tab).innerHTML = renderCards(tab);
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => renderTab(btn.dataset.tab));
});
</script>
